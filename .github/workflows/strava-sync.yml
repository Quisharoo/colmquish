name: Sync Strava

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-strava:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          # Exchange refresh token for access token
          TOKEN_RESPONSE=$(curl -s -X POST https://www.strava.com/oauth/token \
            -d client_id="$STRAVA_CLIENT_ID" \
            -d client_secret="$STRAVA_CLIENT_SECRET" \
            -d refresh_token="$STRAVA_REFRESH_TOKEN" \
            -d grant_type=refresh_token)

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Fetch last 3 activities
          ACTIVITIES=$(curl -s "https://www.strava.com/api/v3/athlete/activities?per_page=3" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          # Build clean JSON for the frontend
          python3 -c "
          import json, sys
          activities = json.load(sys.stdin)
          out = {
              'lastUpdated': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
              'activities': [{
                  'id': a['id'],
                  'name': a['name'],
                  'type': a['type'],
                  'distance_km': round(a['distance'] / 1000, 2),
                  'elapsed_time': a['elapsed_time'],
                  'moving_time': a['moving_time'],
                  'date': a['start_date_local'][:10],
                  'pace': None if a.get('average_speed', 0) == 0 else round(a['distance'] / a['average_speed'] / 60, 2),
                  'elev_gain_m': round(a.get('total_elevation_gain', 0), 0),
                  'url': f'https://www.strava.com/activities/{a[\"id\"]}'
              } for a in activities[:3]]
          }
          with open('assets/data/strava.json', 'w') as f:
              json.dump(out, f, indent=2)
          "

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/strava.json
          git diff --cached --quiet || git commit -m "chore: update strava activities"
          git push
